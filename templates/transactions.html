{% extends 'base.html' %}

{% block content %}
<div class="flex justify-between items-end mb-8">
    <div>
        <h2 class="text-4xl font-bold tracking-tighter">Transacciones</h2>
        <p class="text-sm text-gray-500 font-medium italic">Gestiona tus ingresos y gastos en tiempo real</p>
    </div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
    <!-- Formulario para añadir transacciones -->
    <div class="lg:col-span-1">
        <div class="bg-white p-8 rounded-[40px] border border-black/5 shadow-sm sticky top-24">
            <h4 class="text-xs font-bold uppercase tracking-widest mb-8">Nuevo Registro</h4>
            <form method="POST" action="{% url 'transactions_page' %}" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2">Descripción</label>
                    <input type="text" name="description" required placeholder="Compra semanal..." class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-4 text-sm focus:outline-none focus:ring-2 focus:ring-black/5">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2">Importe (€)</label>
                        <input type="number" name="amount" step="0.01" required placeholder="0.00" class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-4 text-sm focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2">Tipo</label>
                        <select name="type" class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-4 text-sm focus:outline-none">
                            <option value="expense">Gasto</option>
                            <option value="income">Ingreso</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2">Categoría</label>
                    <input type="text" name="category" placeholder="Alimentación, Ocio..." class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-4 text-sm focus:outline-none">
                </div>
                <button type="submit" class="w-full bg-black text-white py-5 rounded-[24px] text-xs font-bold uppercase tracking-widest hover:scale-[1.02] transition-transform shadow-lg">
                    Añadir Transacción
                </button>
            </form>
        </div>
    </div>

    <!-- Tabla de transacciones -->
    <div class="lg:col-span-2">
        <div class="bg-white rounded-[40px] border border-black/5 overflow-hidden shadow-sm">
            <!-- Contenido de la tabla ya existente pero mejorado -->
            <table class="w-full text-left">
        <thead>
            <tr class="text-[10px] font-bold text-gray-400 uppercase tracking-widest border-b border-black/5">
                <th class="px-6 py-4">Descripción</th>
                <th class="px-6 py-4">Categoría</th>
                <th class="px-6 py-4">Fecha</th>
                <th class="px-6 py-4 text-right">Cantidad</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-black/5">
            <!-- Example Data -->
            <tr class="hover:bg-gray-50/50 transition-colors">
                <td class="px-6 py-5 font-semibold text-sm italic">Suscripción Netflix</td>
                <td class="px-6 py-5">
                    <span class="text-[10px] font-bold text-indigo-500 bg-indigo-50 px-2 py-1 rounded-full uppercase">Ocio</span>
                </td>
                <td class="px-6 py-5 text-xs text-gray-500">30 Abr 2024</td>
                <td class="px-6 py-5 text-right font-bold">-17,99€</td>
            </tr>
            <tr class="hover:bg-gray-50/50 transition-colors">
                <td class="px-6 py-5 font-semibold text-sm italic">Transferencia Bizum</td>
                <td class="px-6 py-5">
                    <span class="text-[10px] font-bold text-emerald-500 bg-emerald-50 px-2 py-1 rounded-full uppercase">Ingresos</span>
                </td>
                <td class="px-6 py-5 text-xs text-gray-500">29 Abr 2024</td>
                <td class="px-6 py-5 text-right font-bold text-emerald-600">+15,00€</td>
            </tr>
        </tbody>
    </table>
</div>
{% endblock %}
